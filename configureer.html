<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Configureer jouw Renault Clio — kies je kleur en bekijk de wagen in 3D.">
<title>Configureer jouw Clio — Renault</title>
<link rel="preload" href="fonts/NouvelRBold.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/NouvelRExtrabold.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'NouvelR';font-weight:300;src:url('fonts/NouvelRLight.woff2') format('woff2');font-display:swap}
@font-face{font-family:'NouvelR';font-weight:400;src:url('fonts/NouvelRRegular.woff2') format('woff2');font-display:swap}
@font-face{font-family:'NouvelR';font-weight:600;src:url('fonts/NouvelRSemibold.woff2') format('woff2');font-display:swap}
@font-face{font-family:'NouvelR';font-weight:700;src:url('fonts/NouvelRBold.woff2') format('woff2');font-display:swap}
@font-face{font-family:'NouvelR';font-weight:800;src:url('fonts/NouvelRExtrabold.woff2') format('woff2');font-display:swap}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0A;
  font-family:'NouvelR',sans-serif;-webkit-font-smoothing:antialiased}

/* 3D canvas */
#cfg-cv{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:1;
  opacity:0;transition:opacity 1.1s ease,transform 1.3s cubic-bezier(0.16,1,0.3,1);
  transform:translateY(28px)}
#cfg-cv.visible{opacity:1;transform:translateY(0)}

/* Loading overlay */
#cfg-loader{position:fixed;inset:0;z-index:200;background:#0A0A0A;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity 0.7s ease}
#cfg-loader.fade{opacity:0;pointer-events:none}
#cfg-loader-logo{height:52px;filter:brightness(0) invert(1);opacity:0.75;margin-bottom:32px}
#cfg-loader-label{font-size:10px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.38);margin-bottom:14px}
#cfg-loader-track{width:160px;height:1.5px;background:rgba(255,255,255,0.10);border-radius:2px;overflow:hidden}
#cfg-loader-bar{height:100%;width:0%;background:rgba(255,255,255,0.65);border-radius:2px;
  transition:width 0.25s ease}

/* UI layer (on top of canvas) */
#cfg-ui{position:fixed;inset:0;z-index:10;pointer-events:none}

/* Top bar */
#cfg-topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;
  justify-content:space-between;padding:24px 32px;pointer-events:auto}
#cfg-nav-logo{height:44px;filter:brightness(0) invert(1);opacity:0.88;flex-shrink:0}
#cfg-back{display:inline-flex;align-items:center;gap:7px;color:rgba(255,255,255,0.60);
  text-decoration:none;font-size:12px;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;transition:color 0.2s;pointer-events:auto}
#cfg-back:hover{color:#fff}
#cfg-back svg{width:16px;height:16px;flex-shrink:0}

/* Center title */
#cfg-title-wrap{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;
  align-items:center;padding-top:30px;pointer-events:none}
#cfg-eyebrow{font-size:9px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(255,255,255,0.32);margin-bottom:7px}
#cfg-title{font-size:clamp(20px,2.6vw,36px);font-weight:800;letter-spacing:-0.022em;color:#fff}

/* Color picker dock */
#cfg-picker{position:absolute;bottom:0;left:0;right:0;
  padding:32px 24px 44px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
  background:linear-gradient(to top,
    rgba(0,0,0,0.90) 0%,
    rgba(0,0,0,0.55) 55%,
    transparent 100%);
  pointer-events:auto}
#cfg-picker-label{font-size:9px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(255,255,255,0.38)}
#cfg-swatches{display:flex;align-items:center;gap:32px}

.swatch{display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none}
.swatch-ring{width:52px;height:52px;border-radius:50%;padding:3px;
  border:2px solid transparent;transition:border-color 0.3s ease,transform 0.2s ease}
.swatch.active .swatch-ring{border-color:rgba(255,255,255,0.85)}
.swatch:hover .swatch-ring{transform:scale(1.07)}
.swatch-dot{width:100%;height:100%;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,0.55)}
.swatch-name{font-size:8px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.38);transition:color 0.25s;white-space:nowrap;text-align:center}
.swatch.active .swatch-name{color:rgba(255,255,255,0.80)}

/* Interaction hint */
#cfg-hint{position:fixed;bottom:160px;left:50%;transform:translateX(-50%);
  z-index:15;display:flex;align-items:center;gap:20px;
  background:rgba(0,0,0,0.52);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);border-radius:100px;
  padding:10px 22px;pointer-events:none;opacity:1}
.cfg-hint-item{display:flex;align-items:center;gap:7px;
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.60);white-space:nowrap}
.cfg-hint-item svg{width:16px;height:16px;opacity:0.70;flex-shrink:0}
.cfg-hint-sep{width:1px;height:16px;background:rgba(255,255,255,0.18)}

/* Responsive */
@media(max-width:768px){
  #cfg-topbar{padding:18px 20px}
  #cfg-nav-logo{height:36px}
  #cfg-title{font-size:clamp(17px,5vw,26px)}
  #cfg-title-wrap{padding-top:22px}
  #cfg-picker{padding:24px 16px 36px;gap:16px}
  #cfg-swatches{gap:24px}
  .swatch-ring{width:46px;height:46px}
}
@media(max-width:430px){
  #cfg-title-wrap{padding-top:18px}
  #cfg-picker{padding:18px 12px 30px}
  #cfg-swatches{gap:20px}
  .swatch-ring{width:44px;height:44px}
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="cfg-loader">
  <img id="cfg-loader-logo" src="renault-logo.svg" alt="Renault">
  <div id="cfg-loader-label">Laden</div>
  <div id="cfg-loader-track"><div id="cfg-loader-bar"></div></div>
</div>

<!-- 3D canvas -->
<canvas id="cfg-cv"></canvas>

<!-- UI overlay -->
<div id="cfg-ui">

  <!-- Top bar -->
  <div id="cfg-topbar">
    <img id="cfg-nav-logo" src="renault-logo.svg" alt="Renault">
    <a id="cfg-back" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Terug
    </a>
  </div>

  <!-- Page title -->
  <div id="cfg-title-wrap">
    <span id="cfg-eyebrow">Renault Clio E-Tech</span>
    <h1 id="cfg-title">Configureer jouw Clio</h1>
  </div>

  <!-- Color picker -->
  <div id="cfg-picker">
    <div id="cfg-picker-label">Kies jouw kleur</div>
    <div id="cfg-swatches">
      <div class="swatch active" data-hex="#1B3A6B" data-label="Intense Blue">
        <div class="swatch-ring">
          <div class="swatch-dot" style="background:#1B3A6B"></div>
        </div>
        <span class="swatch-name">Intense Blue</span>
      </div>
      <div class="swatch" data-hex="#C0392B" data-label="Flamme Rouge">
        <div class="swatch-ring">
          <div class="swatch-dot" style="background:#C0392B"></div>
        </div>
        <span class="swatch-name">Flamme Rouge</span>
      </div>
      <div class="swatch" data-hex="#F5C518" data-label="Soleil Yellow">
        <div class="swatch-ring">
          <div class="swatch-dot" style="background:#F5C518"></div>
        </div>
        <span class="swatch-name">Soleil Yellow</span>
      </div>
    </div>
  </div>

  <!-- Interaction hint — always visible -->
  <div id="cfg-hint">
    <span class="cfg-hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 11V6a3 3 0 0 1 6 0v5"/><path d="M9 11H5l1 9h12l1-9h-4"/><path d="M12 11v4"/></svg>
      Slepen om te draaien
    </span>
    <div class="cfg-hint-sep"></div>
    <span class="cfg-hint-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      Scrollen om te zoomen
    </span>
  </div>

</div><!-- /cfg-ui -->

<!-- Three.js r140 — identical to main page -->
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/loaders/DRACOLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/loaders/RGBELoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>

<script>
'use strict';

var isMobile = window.innerWidth <= 768;

// ── Renderer — identical flags to index.html ──────────────────────
var canvas   = document.getElementById('cfg-cv');
var renderer = new THREE.WebGLRenderer({
  canvas: canvas, antialias: true,
  powerPreference: 'high-performance', precision: 'highp'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled       = true;
renderer.shadowMap.type          = THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;
renderer.toneMapping             = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure     = isMobile ? 0.82 : 0.70;
renderer.outputEncoding          = THREE.sRGBEncoding;

// ── Scene ─────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0A0A0A);

// ── Camera ────────────────────────────────────────────────────────
var camera = new THREE.PerspectiveCamera(
  isMobile ? 48 : 38,
  window.innerWidth / window.innerHeight,
  0.05, 200
);
camera.position.set(0, 1.5, isMobile ? 6.8 : 6.0);

// ── Controls ──────────────────────────────────────────────────────
var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.enablePan        = false;
controls.minDistance      = isMobile ? 4.5 : 3.8;
controls.maxDistance      = isMobile ? 10  : 8.5;
controls.minPolarAngle    = Math.PI * 0.28;  // Y-axis only — tight vertical lock
controls.maxPolarAngle    = Math.PI * 0.42;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.65;
controls.target.set(0, 0.55, 0);
controls.update();

// ── Lighting — same values as index.html ─────────────────────────
var ambLight = new THREE.AmbientLight(0xffffff, 0.18);
scene.add(ambLight);

var key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(-6, 4.5, 3);
key.castShadow = true;
key.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -9;
key.shadow.camera.right = key.shadow.camera.top   =  9;
key.shadow.bias = -0.0002; key.shadow.normalBias = 0.02; key.shadow.radius = 3;
scene.add(key);

var rimLight = new THREE.DirectionalLight(0x8ab0ff, 0.7);
rimLight.position.set(5, 3.5, -5);
scene.add(rimLight);

var fillLight = new THREE.DirectionalLight(0xffffff, 0.25);
fillLight.position.set(0, 4, 4);
scene.add(fillLight);

var bounceLight = new THREE.DirectionalLight(0x8898cc, 0.12);
bounceLight.position.set(0, -4, 1);
scene.add(bounceLight);

// ── Environment map (HDR IBL) — identical to index.html ──────────
var pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();

new THREE.RGBELoader()
  .setDataType(isMobile ? THREE.HalfFloatType : THREE.FloatType)
  .load('env.hdr', function(hdr) {
    var envMap = pmrem.fromEquirectangular(hdr).texture;
    scene.environment = envMap;
    hdr.dispose(); pmrem.dispose();
  }, undefined, function(e) {
    console.warn('[cfg] env.hdr failed, falling back to direct lights only:', e);
    pmrem.dispose();
    ambLight.intensity  = 1.2;
    key.intensity       = 8.0;
    rimLight.intensity  = 3.5;
    fillLight.intensity = 1.5;
  });

// ── Dark studio floor ─────────────────────────────────────────────
var floorMat = new THREE.MeshStandardMaterial({
  color: 0x111111, roughness: 0.18, metalness: 0.80, envMapIntensity: 0.4
});
var floor = new THREE.Mesh(new THREE.PlaneGeometry(28, 28), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ── Color system ──────────────────────────────────────────────────
var PALETTE = {
  '#1B3A6B': new THREE.Color(0x1B3A6B),
  '#C0392B': new THREE.Color(0xC0392B),
  '#F5C518': new THREE.Color(0xF5C518)
};

// Palette in LINEAR space — CSS hex is sRGB; convert so ACES renders them correctly
var PALETTE = {
  '#1B3A6B': new THREE.Color('#1B3A6B').convertSRGBToLinear(),
  '#C0392B': new THREE.Color('#C0392B').convertSRGBToLinear(),
  '#F5C518': new THREE.Color('#F5C518').convertSRGBToLinear()
};

// One shared material for all CarPaint.002 meshes
var paintMat  = null;
var fromColor = new THREE.Color().copy(PALETTE['#1B3A6B']);
var toColor   = new THREE.Color().copy(PALETTE['#1B3A6B']);
var curColor  = new THREE.Color().copy(PALETTE['#1B3A6B']);
var lerpT     = 1;
var activeHex = '#1B3A6B';
var LERP_DUR  = 0.6;

function applyColor(c) { if (paintMat) paintMat.color.copy(c); }

// Clone the original GLB material — preserves all texture/normal/roughness maps —
// then upgrade to MeshPhysical and add clearcoat on top
function makePaintMat(src) {
  var m = isMobile
    ? new THREE.MeshStandardMaterial()
    : new THREE.MeshPhysicalMaterial();
  m.copy(src);                              // keep all maps from the GLB
  m.color.copy(curColor);                  // apply initial colour in linear space
  m.metalness        = 0.0;               // paint is not metallic
  m.envMapIntensity  = 1.6;
  if (!isMobile) {
    m.clearcoat            = 0.85;
    m.clearcoatRoughness   = 0.04;
    m.reflectivity         = 0.5;
  }
  m.name = 'CarPaint.002';
  return m;
}

// ── GLB loading ───────────────────────────────────────────────────
var loaderBar = document.getElementById('cfg-loader-bar');

var dracoLoader = new THREE.DRACOLoader();
dracoLoader.setDecoderPath('./draco/');
dracoLoader.setDecoderConfig({ type: 'js' });

var gltfLoader = new THREE.GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

gltfLoader.load(
  'clio.glb',
  function onLoad(gltf) {
    var car = gltf.scene;

    // Same centering logic as index.html
    var box = new THREE.Box3().setFromObject(car);
    var ctr = new THREE.Vector3();
    box.getCenter(ctr);
    car.position.set(-ctr.x, -box.min.y, -ctr.z);

    car.traverse(function(child) {
      if (!child.isMesh) return;
      child.castShadow    = true;
      child.receiveShadow = true;

      if (!child.material) return;

      var matName = child.material.name || '';

      if (matName === 'CarPaint.002') {
        // Create once (copying all maps from GLB), share across all paint meshes
        if (!paintMat) paintMat = makePaintMat(child.material);
        child.material = paintMat;

      } else if (matName === 'NumberPlate.002') {
        // Reproduce TIMECHAMBER plate — same canvas code as index.html
        var pcv  = document.createElement('canvas');
        pcv.width = 640; pcv.height = 160;
        var pctx = pcv.getContext('2d');
        pctx.fillStyle = '#000';
        pctx.fillRect(0, 0, 640, 160);
        pctx.strokeStyle = 'rgba(255,255,255,0.20)';
        pctx.lineWidth = 4;
        pctx.strokeRect(8, 8, 624, 144);
        pctx.fillStyle = '#fff';
        pctx.font = 'bold 60px Arial,sans-serif';
        pctx.textAlign = 'center';
        pctx.textBaseline = 'middle';
        pctx.fillText('TIMECHAMBER', 320, 82);
        var plateTex = new THREE.CanvasTexture(pcv);
        plateTex.flipY = false;
        plateTex.needsUpdate = true;
        child.material = new THREE.MeshStandardMaterial({
          map: plateTex, roughness: 0.35, metalness: 0.05
        });

      } else {
        // All other materials — same as index.html: just boost env map
        child.material.envMapIntensity = 1.6;
      }

      child.material.needsUpdate = true;
    });

    scene.add(car);

    // Reveal
    loaderBar.style.width = '100%';
    setTimeout(function() {
      var loaderEl = document.getElementById('cfg-loader');
      loaderEl.classList.add('fade');
      setTimeout(function(){ loaderEl.style.display = 'none'; }, 800);
      canvas.classList.add('visible');
    }, 350);
  },
  function onProgress(xhr) {
    if (xhr.total > 0) {
      loaderBar.style.width = Math.round(xhr.loaded / xhr.total * 92) + '%';
    }
  },
  function onError(err) {
    console.error('[cfg] GLB load error:', err);
    document.getElementById('cfg-loader').classList.add('fade');
    canvas.classList.add('visible');
  }
);

// ── Color picker ─────────────────────────────────────────────────
var swatches = document.querySelectorAll('.swatch');

swatches.forEach(function(sw) {
  sw.addEventListener('click', function() {
    var hex = sw.dataset.hex;
    if (hex === activeHex) return;
    activeHex = hex;
    swatches.forEach(function(s){ s.classList.remove('active'); });
    sw.classList.add('active');
    fromColor.copy(curColor);
    toColor.copy(PALETTE[hex]);   // already linear-converted
    lerpT = 0;
  });
});

// ── Auto-rotate pause on interaction ─────────────────────────────
var rotateTimer = null;
function pauseRotate() {
  controls.autoRotate = false;
  if (rotateTimer) clearTimeout(rotateTimer);
  rotateTimer = setTimeout(function(){ controls.autoRotate = true; }, 3000);
}
renderer.domElement.addEventListener('pointerdown', pauseRotate, { passive: true });

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────
var lastNow = 0;

function tick(now) {
  requestAnimationFrame(tick);
  var dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;

  if (lerpT < 1) {
    lerpT = Math.min(lerpT + dt / LERP_DUR, 1);
    var eased = 1 - Math.pow(1 - lerpT, 3);
    curColor.lerpColors(fromColor, toColor, eased);
    applyColor(curColor);
  }

  controls.update();
  renderer.render(scene, camera);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
